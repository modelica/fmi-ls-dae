name: pre-commit

on:
  push:
    branches-ignore: [ 'temp/*' ]
  pull_request:
    branches: [ main ]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: actions/setup-python@v6
      with:
        python-version: '3.13'
    - uses: pre-commit/action@v3.0.1
